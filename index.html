<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即梦助力领2元红包</title>
    <style>
        * {margin: 0; padding: 0, box-sizing: border-box;font-family: system-ui, -apple-system, sans-serif;}
        body {background: #f5f7fa;padding: 20px;font-size: 16px;line-height: 1.6;}
        .box {background: #fff;border-radius: 16px;padding: 24px;box-shadow: 0 2px 12px rgba(0,0,0,0.08);}
        h2 {text-align: center;color: #222;margin-bottom: 20px;}
        .step {background: #f0f7ff;padding: 14px;border-radius: 10px;margin: 12px 0;}
        .step b {color: #0066cc;font-size:17px;}
        .link-btn {display: block;text-align: center;background: #0066cc;color: white;padding: 14px;border-radius: 10px;text-decoration: none;font-size: 18px;font-weight: bold;margin: 15px 0;}
        .operate-img {width:100%;border-radius:8px;margin:8px 0;}
        input, button {width: 100%;padding: 12px;margin: 10px 0;border: 1px solid #ddd;border-radius: 8px;font-size: 16px;}
        button {background: #28c76f;color: white;border: none;font-weight: bold;margin-top:15px;}
        .del-btn {background:#ff4d4f;color:white;padding:6px 10px;font-size:14px;margin:5px 0;border:none;border-radius:6px;}
        .tip {font-size: 14px;color: #666;margin-top: 10px;text-align: center;}
        .preview-box {margin:10px 0;}
        .preview-img {width:100%;border-radius:8px;margin:5px 0;}
    </style>
</head>
<body>
    <div class="box">
        <h2>✅ 即梦AI助力任务 完成立领2元红包</h2>

        <div class="step">
            <b>第一步：点下方链接下载注册即梦AI</b>
            <a class="link-btn" href=" " target="_blank">👉 我的即梦邀请链接</a >
        </div>

        <div class="step">
            <b>第二步：按照下面图片一步步操作</b>
            <div class="img-box">
                <img class="operate-img" src="123.jpg" alt="操作教程">
            </div>
        </div>

        <div class="step">
            <b>第三步：上传完成截图 + 微信/支付宝收款码</b>
            <input type="file" id="imgUpload" multiple accept="image/*" onchange="previewImg(event)">
            <div class="preview-box" id="previewBox"></div>
            <button class="del-btn" onclick="clearImg()">删除图片，重新上传</button>
        </div>

        <button onclick="submitTask()">提交任务，领2元红包</button>
        <div class="tip">提交后我核对图片，立刻转账，秒结</div>
    </div>

    <script>
        let imgFiles = [];
        function previewImg(e) {
            imgFiles = e.target.files;
            const box = document.getElementById('previewBox');
            box.innerHTML = "";
            for(let i=0; i<imgFiles.length; i++){
                const reader = new FileReader();
                reader.onload = function(ev){
                    box.innerHTML += `< img class="preview-img" src="${ev.target.result}">`;
                }
                reader.readAsDataURL(imgFiles[i]);
            }
        }
        function clearImg(){
            document.getElementById('imgUpload').value = "";
            document.getElementById('previewBox').innerHTML = "";
            imgFiles = [];
        }
        function submitTask(){
            if(imgFiles.length===0){
                alert("请上传完成截图和收款码！");
                return;
            }
            alert("提交成功！\n\n请把上传的图片发给我，我马上发2元红包！");
        }
    </script>
</body>
</html>
